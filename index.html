<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Simulacro 2 Examen Celador</title>
<style>
    /* ESTILOS BASE */
    :root { --main: #800040; --ok: #198754; --fail: #dc3545; --blank: #6c757d; --bg: #f4f7f6; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* MENSAJE DE ERROR ANTIFALLOS MAC */
    #crash-msg { display:none; padding:20px; background:#f8d7da; color:#721c24; text-align:center; font-weight:bold; font-size: 1.1rem; border-bottom: 3px solid #f5c6cb; z-index: 99999; }

    /* HEADER */
    header { background: #fff; padding: 8px 12px; border-bottom: 4px solid var(--main); z-index: 100; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
    .title { font-weight: 900; color: var(--main); font-size: 0.9rem; margin: 0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-icon { background: #e2e6ea; border: 1px solid #ccc; border-radius: 6px; padding: 6px 10px; font-size: 1.1rem; cursor: pointer; line-height: 1; min-width: 40px; }
    .timer { background: #fce4ec; color: var(--main); padding: 5px 10px; border-radius: 12px; font-weight: bold; font-size: 1rem; min-width: 70px; text-align: center; border: 1px solid #f8bbd0; font-variant-numeric: tabular-nums; }
    .btn-pause { background: #6c757d; color: white; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .score-bar { display: flex; justify-content: center; align-items: center; gap: 15px; background: #f8f9fa; margin-top: 8px; padding: 5px; border-radius: 6px; font-size: 0.95rem; font-weight: bold; border: 1px solid #eee; }
    .progress-track { height: 6px; background: #e0e0e0; margin-top: 8px; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--main); width: 0%; transition: width 0.3s; }

    /* CONTENIDO */
    main { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; display: flex; justify-content: center; align-items: flex-start; }
    .card { background: #fff; width: 100%; max-width: 800px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 40px; }

    /* PREGUNTA */
    .q-meta { color: #888; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: block; }
    .q-text { font-size: 1.2rem; font-weight: 700; color: #222; margin-bottom: 20px; line-height: 1.4; }
    
    .split-layout { display: flex; flex-direction: column; gap: 15px; }
    @media(min-width: 768px) { .split-layout { flex-direction: row; align-items: flex-start; } .img-col { width: 45%; } .txt-col { width: 55%; } }
    .q-img { width: 100%; height: auto; border: 1px solid #ccc; border-radius: 8px; display: block; margin-bottom: 15px; }

    /* OPCIONES */
    .options-grid { display: flex; flex-direction: column; gap: 12px; }
    .btn-opt { width: 100%; text-align: left; background: #fff; border: 2px solid #e0e0e0; padding: 16px; border-radius: 10px; font-size: 1rem; color: #333; cursor: pointer; -webkit-appearance: none; touch-action: manipulation; transition: 0.1s; }
    .btn-opt:active { background: #f8f9fa; transform: scale(0.99); }
    .btn-opt.correct { background: #d1e7dd !important; border-color: var(--ok) !important; color: #0f5132 !important; font-weight: bold; }
    .btn-opt.wrong { background: #f8d7da !important; border-color: var(--fail) !important; color: #842029 !important; }
    .disabled { pointer-events: none; opacity: 1; }

    /* NAVEGACIÓN */
    .nav-bar { display: flex; gap: 10px; margin-top: 30px; padding-top: 15px; border-top: 1px solid #eee; }
    .btn-nav { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; background: #e9ecef; color: #555; -webkit-appearance: none; }
    .btn-next { background: var(--main); color: #fff; }
    .btn-finish { background: #212529 !important; color: #fff !important; display: none; }
    .btn-nav:disabled { opacity: 0.4; }

    /* PAUSA */
    #pause-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
    .btn-resume { padding: 15px 40px; background: var(--main); color: #fff; border: none; border-radius: 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

    /* RESULTADOS */
    #results-view { display: none; text-align: center; }
    .res-tbl { width: 100%; border-collapse: collapse; margin: 20px 0; border: 2px solid var(--main); }
    .res-tbl th { background: var(--main); color: #fff; padding: 10px; }
    .res-tbl td { border: 1px solid #ddd; padding: 10px; font-size: 1.1rem; }
    .bolsa-box { background: #fff3cd; border: 2px solid #ffc107; padding: 15px; border-radius: 10px; margin: 20px 0; }
    .actions { display: flex; gap: 10px; margin-bottom: 30px; flex-direction: column; }
    @media(min-width: 400px) { .actions { flex-direction: row; } }
    .btn-act { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff; }
    .btn-rep { background: var(--main); }
    .btn-goog { background: #4285F4; }
    .rev-list { text-align: left; margin-top: 30px; }
    .rev-item { padding: 15px 0; border-bottom: 1px solid #eee; }
</style>

<script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
        var errBox = document.getElementById('crash-msg');
        if(errBox) {
            errBox.style.display = 'block';
            errBox.innerHTML = "⚠️ ERROR CRÍTICO DETECTADO<br><br>Parece que las comillas del código se han corrompido al guardarlo en TextEdit (Mac).<br><br>Por favor, asegúrate de desactivar 'Comillas tipográficas' en Edición -> Sustituciones dentro de TextEdit y vuelve a pegar el código.<br><br><small>Detalle técnico: " + msg + " en línea " + lineNo + "</small>";
        }
        return false;
    };
</script>
</head>
<body>

<div id="crash-msg"></div>

<div id="pause-screen">
    <h2 style="color:var(--main)">TEST PAUSADO</h2>
    <button class="btn-resume" onclick="togglePause()">CONTINUAR</button>
</div>

<header>
    <div class="top-bar">
        <div class="title">SIMULACRO 2 EXAMEN CELADOR</div>
        <div class="controls">
            <button class="btn-icon" onclick="manualJump(0)">⏪</button>
            <button class="btn-icon" onclick="manualJump(db.length - 1)">⏩</button>
            <div class="timer" id="timer">128:45</div>
            <button class="btn-pause" onclick="togglePause()">II</button>
        </div>
    </div>
    <div class="score-bar">
        <span style="color:var(--ok)">✅ <span id="sc-ok">0</span></span>
        <span style="color:var(--fail)">❌ <span id="sc-fail">0</span></span>
        <span style="color:var(--blank)">⚪ <span id="sc-blank">103</span></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-bar"></div></div>
</header>

<main>
    <div id="quiz-view" class="card">
        <div id="question-container"></div>
        <div class="nav-bar">
            <button class="btn-nav" id="btn-prev" onclick="manualNav(-1)">ANTERIOR</button>
            <button class="btn-nav btn-next" id="btn-next" onclick="manualNav(1)">SIGUIENTE</button>
            <button class="btn-nav btn-finish" id="btn-end" onclick="finishTest()">FINALIZAR</button>
        </div>
    </div>

    <div id="results-view" class="card">
        <h2 style="color:var(--main)">RESULTADOS FINALES</h2>
        <table class="res-tbl">
            <tr><th>Aciertos</th><th>Fallos</th><th>Blancos</th></tr>
            <tr style="font-weight:bold; font-size:1.4rem">
                <td style="color:var(--ok)" id="r-ok">0</td>
                <td style="color:var(--fail)" id="r-fail">0</td>
                <td id="r-blank">0</td>
            </tr>
            <tr style="background:#f9f9f9; font-size:0.9rem; color:#666;">
                <td>x 3.75</td><td>x 1.25</td><td>PUNTOS / 386.25</td>
            </tr>
            <tr style="font-size:1.6rem; color:var(--main); font-weight:bold">
                <td id="pts-ok">0</td>
                <td id="pts-fail">0</td>
                <td id="pts-total">0</td>
            </tr>
        </table>

        <div class="bolsa-box">
            <div style="font-size:1.2rem">NOTA (0-10): <strong id="val-10">0</strong></div>
            <div style="font-size:1.8rem; font-weight:900; color:#d35400; margin-top:5px">BOLSA: <span id="val-bolsa">0 PUNTOS</span></div>
        </div>

        <div id="quote-area" style="font-style:italic; color:#555; background:#f9f9f9; padding:15px; border-radius:8px; margin:20px 0;"></div>
        
        <div class="actions">
            <button class="btn-act btn-rep" onclick="location.reload()">REPETIR TEST</button>
            <button class="btn-act btn-goog" onclick="window.location.href='https://www.google.com'">SALIR A GOOGLE</button>
        </div>

        <h3 style="text-align:left; border-bottom:2px solid #eee">Revisión de Respuestas</h3>
        <div id="review-list" class="rev-list"></div>
    </div>
</main>

<script>
// DATOS (Comillas limpias y controladas)
const db = [
 {q:"1. Conforme al artículo 116 de la Constitución, ¿quién declara, y por cuánto tiempo, el estado de alarma?",o:["a) Por el Gobierno mediante Decreto acordado en Consejo de Ministros por un período máximo de treinta días.","b) Por el Gobierno mediante Decreto acordado en Consejo de Ministros por un período improrrogable de quince días.","c) Por el Gobierno mediante Decreto acordado en Consejo de Ministros por un período de quince días prorrogable.","d) Por la mayoría absoluta del Congreso de los Diputados, a propuesta exclusiva del Gobierno."],a:2},
 {q:"2. El Defensor del Pueblo es elegido por las Cortes Generales por un periodo de cinco años, pero ¿quién propone su elección?",o:["a) Los Plenos de ambas Cámaras por mayoría absoluta.","b) El Presidente del Gobierno.","c) La Comisión mixta Congreso-Senado para las elecciones del Defensor del Pueblo.","d) La Comisión mixta Congreso-Senado para las relaciones con el Defensor del Pueblo."],a:3},
 {q:"3. Señala una de las atribuciones del Consell en política general:",o:["a) Aprobar las directrices de coordinación que habrán de aplicar las Diputaciones Provinciales en las materias declaradas de interés general para la Comunitat Valenciana.","b) Ejercer la potestad reglamentaria, de acuerdo con la Constitución Española, el Estatut d'Autonomia de la Comunitat Valenciana y las leyes.","c) Proponer a Les Corts la reforma del Estatut d'Autonomia de la Comunitat Valenciana.","d) La planificación y desarrollo de la política valenciana."],a:3},
 {q:"4. Señala cuál de las siguientes no es una de las 11 Consellerias determinadas en el Decreto 5/2019 de 16 de junio del President de la Generalitat:",o:["a) Conselleria de Agricultura, Desarrollo Rural, Emergencia Climática y Transición Ecológica.","b) Conselleria de Hacienda y Financiación Europea.","c) Conselleria de Economía Sostenible, Sectores Productivos, Comercio y Trabajo.","d) Conselleria de Justicia, Interior y Administración Pública."],a:1},
 {q:"5. Señala la respuesta incorrecta respecto al I Plan de Igualdad de la Conselleria de Sanidad Universal y Salud Pública:",o:["a) Plantea 9 Áreas de intervención, asignando a cada una de ellas un objetivo a alcanzar y un conjunto de medidas que adoptar para su consecución.","b) Va dirigido a todo el personal gestionado por la Conselleria de Sanidad Universal y Salud Pública, cualquiera que sea su relación jurídica, plaza o puesto que ocupe, así como al personal adscrito a los consorcios hospitalarios.","c) La Resolución de 9 de junio de 2016, de la Consellera de Sanidad Universal y Salud Pública, ordenó la publicación del I Plan de Igualdad de la Conselleria de Sanidad Universal y Salud Pública.","d) Quedan fuera de su ámbito las trabajadoras y los trabajadores que presten sus servicios en centros gestionados mediante concesión administrativa en régimen distinto del estatutario."],a:1},
 {q:"6. ¿Qué Área del I Plan de Igualdad de la Conselleria de Sanidad Universal y Salud Pública tiene por objetivo promover la paridad en la composición de los órganos colegiados de carácter técnico, existentes en la Conselleria?",o:["a) El Área I.","b) El Área II.","c) El Área III.","d) El Área V."],a:1},
 {q:"7. ¿Cómo se denomina el tratamiento de datos personales de manera tal que ya no puedan atribuirse a un interesado sin utilizar información adicional, siempre que dicha información adicional figure por separado y esté sujeta a medidas técnicas y organizativas destinadas a garantizar que los datos personales no se atribuyan a una persona física identificada o identificable?",o:["a) Anonimato digital.","b) Aislación.","c) Generalización.","d) Seudonimización."],a:3},
 {q:"8. ¿Qué principio relativo al tratamiento dispone que los datos personales serán adecuados, pertinentes y limitados a lo necesario en relación con los fines para los que son tratados?",o:["a) El principio de responsabilidad.","b) El principio de minimización de datos.","c) El principio de exactitud.","d) El principio de licitud, lealtad y transparencia."],a:1},
 {q:"9. ¿Cuál es la velocidad de un USB 3.0?",o:["a) 12 Megabits por segundo.","b) 480 Megabits por segundo.","c) 4,8 Gigabits por segundo.","d) 10 Gigabits por segundo."],a:2},
 {q:"10. Señala cuál de los siguientes no es un periférico de entrada:",o:["a) Micrófono.","b) Escáner.","c) Webcam.","d) Plóter."],a:3},
 {q:"11. ¿Qué tipo de referencias toma Excel por defecto?",o:["a) Las Referencias Relativas.","b) Las Referencias Mixtas.","c) Las Referencias Absolutas.","d) Las Referencias Simples."],a:0},
 {q:"12. Para escribir la fórmula en la celda, siempre deberá comenzar con un:",o:["a) +.","b) =.","c) -.","d) /."],a:1},
 {q:"13. Las Comunidades Autónomas ajustarán el ejercicio de sus competencias en materia sanitaria a:",o:["a) Criterios de participación democrática de todos los interesados, así como de los representantes sindicales y de las organizaciones empresariales.","b) Criterios de participación democrática de todos los usuarios, así como de los representantes de los consumidores y de los usuarios.","c) Los representantes sindicales y de las organizaciones empresariales de sus respectivos Servicios de Salud.","d) Los órganos de gestión y control de sus respectivos Servicios de Salud."],a:0},
 {q:"14. Con el fin de articular la participación en el ámbito de las Comunidades Autónomas, se creará:",o:["a) El Área de Salud de la Comunidad Autónoma.","b) El Consejo de Salud de la Comunidad Autónoma.","c) El órgano de gestión de sus respectivos Servicios de Salud.","d) El órgano de control de sus respectivos Servicios de Salud."],a:1},
 {q:"15. En relación con los siguientes principios básicos, señala la respuesta correcta:",o:["a) El paciente o usuario tiene derecho a decidir libremente, antes de recibir la información adecuada, entre las opciones clínicas disponibles.","b) Todo paciente o usuario tiene deber a negarse al tratamiento, excepto en los casos determinados en la Ley.","c) La negativa al tratamiento constará por escrito.","d) Los pacientes o usuarios tienen el derecho de facilitar los datos sobre su estado físico o sobre su salud de manera leal y verdadera."],a:2},
 {q:"16. ¿Quién prestará el consentimiento cuando el paciente no sea capaz de tomar decisiones, a criterio del médico responsable de la asistencia, o su estado físico o psíquico no le permita hacerse cargo de su situación?",o:["a) El representante legal si existe.","b) Las personas vinculadas a él por razones familiares.","c) Las personas vinculadas a él por razones de hecho.","d) Todas las respuestas son correctas."],a:0},
 {q:"17. Los centros sanitarios tienen la obligación de conservar la documentación clínica en condiciones que garanticen su correcto mantenimiento y seguridad, aunque no necesariamente en el soporte original, para la debida asistencia al paciente durante el tiempo adecuado a cada caso y, como mínimo:",o:["a) Cinco años contados desde la fecha del alta de cada proceso asistencial.","b) Cuatro años contados desde la fecha del alta de cada proceso asistencial.","c) Tres años contados desde la fecha del alta de cada proceso asistencial.","d) Dos años contados desde la fecha del alta de cada proceso asistencial."],a:0},
 {q:"18. La gestión de la historia clínica por los centros con pacientes hospitalizados, o por los que atiendan a un número suficiente de pacientes bajo cualquier otra modalidad asistencial, según el criterio de los servicios de salud, se realizará a través de:",o:["a) La unidad de admisión y documentación clínica, encargada de integrar en un solo archivo las historias clínicas.","b) La dirección del centro sanitario.","c) Los profesionales sanitarios.","d) Todas las respuestas son correctas."],a:0},
 {q:"19. Funcionalmente, el personal de los Servicios de Atención e Información al Paciente dependerá de:",o:["a) La Gerencia de su Departamento de Salud.","b) El Comisionado de Sanidad del Departamento de Salud.","c) La Dirección General con competencias en materia de atención al/a la paciente.","d) Unidad funcional de atención e información."],a:2},
 {q:"20. Para alcanzar los objetivos de eficacia y eficiencia, el Servicio de Atención e Información al Paciente desarrolla sus funciones en cada Departamento de Salud a través de la siguiente estructura:",o:["a) La Gerencia de su Departamento de Salud.","b) El Comisionado de Sanidad del Departamento de Salud.","c) La Dirección General con competencias en materia de atención al/a la paciente.","d) Unidad funcional de atención e información."],a:3},
 {q:"21. ¿Corresponde a los celadores informar sobre el pronóstico de un paciente a sus familiares?",o:["a) Si el celador es conocedor, gracias a su experiencia, de la gravedad y posible pronóstico de la enfermedad, debe informar a los familiares.","b) Solo si tienen información sobre diagnósticos, exploraciones o tratamientos.","c) Debe valorarlo en cada situación concreta.","d) Nunca."],a:3},
 {q:"22. El jefe de personal subalterno tiene unas funciones definidas, pero también pueden confiarle otras misiones algunos de los siguientes profesionales:",o:["a) El Director Gerente y el Director de Gestión y Servicios Generales de la Institución.","b) El jefe de seguridad, el director del centro y el gerente de zona.","c) El jefe de sala y el presidente de sección.","d) Nadie puede asignarle más misiones que las ya establecidas."],a:0},
 {q:"23. ¿Es deber del jefe de personal subalterno cuidará de la compostura y aseo del personal a sus órdenes?",o:["a) Si, además, revisará y exigirá que vistan el uniforme reglamentario.","b) No.","c) Esta es una función del personal de limpieza.","d) Si, del personal a sus órdenes y de los pacientes."],a:0},
 {q:"24. Una de las misiones del jefe de personal subalterno es:",o:["a) Ejercer el debido y discreto control de paquetes y bultos de que sean portadoras las personas ajenas a la institución que tengan acceso a la misma.","b) Abrir todos los paquetes que entreguen en la institución, siendo su responsabilidad y pudiendo delegar esta en el personal a su cargo.","c) No abrir ni mostrar interés por los paquetes y bultos de que sean portadoras las personas ajenas a la Institución que tengan acceso a la misma.","d) Velar por la integridad de los paquetes que entren en la institución."],a:0},
 {q:"25. La supervisión del cumplimiento del horario del personal de oficio corresponde a:",o:["a) Cada trabajador es responsable de su horario y solo debe responder ante el director del centro.","b) Opcionalmente el jefe de personal subalterno puede estar atento a los horarios de los demás y en caso de detectar mala fe, tendrá que expulsar al trabajador de su puesto.","c) Al jefe del personal subalterno y tendrá que comprobar que permanecen constantemente en su puesto de trabajo.","d) Es función del director de la institución."],a:2},
 {q:"26. El baño de los enfermos masculinos cuando no puedan hacerlo por sí mismos, es una tarea que debe ser realizada por:",o:["a) Los celadores, siempre de acuerdo con las instrucciones que reciban de las Supervisoras de plantas o servicios o personas que las sustituyan.","b) Esta labor debe realizarla las enfermeras, con independencia del género de los pacientes.","c) Esta labor es de las auxiliares.","d) Los pacientes deben asearse solos, en caso de no ser posible, lo hará un familiar."],a:0},
 {q:"27. ¿Cómo se denomina al tipo de asistencia sanitaria prestada por la Unidad de Urgencias del hospital, que comprende, asistencia en urgencias y alta al domicilio?",o:["a) Asistencia en régimen de observación.","b) Asistencia en régimen domiciliario.","c) Asistencia en régimen ambulatorio.","d) Asistencia en régimen de inmediatez."],a:2},
 {q:"28. Señala cuál de los siguientes enunciados, no corresponde con alguno de los responsables del servicio de urgencias hospitalario:",o:["a) Jefe de personal subalterno.","b) Supervisor/a de enfermería.","c) Coordinador médico de urgencias.","d) Responsable de hostelería y limpieza."],a:3},
 {q:"29. ¿Cómo se denomina a los médicos que están recibiendo formación como de especialistas en el hospital durante varios años? Entre los distintos servicios en que se han de formar se encuentra urgencias.",o:["a) Facultativos especialistas.","b) MIR (médicos internos residentes).","c) Médicos generalistas.","d) Facultativos no especialistas."],a:1},
 {q:"30. ¿En qué instalaciones se ubican los Servicios especiales de urgencias?",o:["a) En las áreas de urgencias hospitalarias.","b) En los Centros de Salud.","c) En las áreas de urgencias de los hospitales de nivel 1.","d) En instalaciones del municipio donde se ubiquen."],a:1},
 {q:"31. ¿Cuál de los siguientes tipos de asistencia, no es propia de los Servicios Normales de Urgencias y Servicios Especiales de Urgencias?",o:["a) Asistencia en régimen ambulatorio.","b) Asistencia urgente.","c) Asistencia en régimen de internamiento.","d) Asistencia domiciliaria."],a:2},
 {q:"32. ¿Qué horario de apertura al público tienen los Centros de Salud?",o:["a) De 8 a 15 horas.","b) De 9 a 17 horas.","c) De 8 a 20 horas.","d) 24 horas."],a:1},
 {q:"33. ¿Cuál de las siguientes funciones, es propia de los celadores en las unidades de urgencias extra hospitalarias?",o:["a) Facilitará la hoja de reclamaciones a usuarios que no estén de acuerdo con la atención recibida.","b) Transportar al enfermo en camilla/silla, así como el equipamiento sanitario que fuese necesario.","c) Tomar los datos del paciente, así como reflejar el motivo de la consulta.","d) Todas las anteriores."],a:3},

let idx = 0;
let userAnswers = new Array(db.length).fill(null);
let tTotal = 128 * 60 + 45; 
let isPaused = false;
let pauseInterval = null;
let okCount = 0;
let failCount = 0;
let blankCount = db.length;
let autoAdvanceTimeout = null;

function render() {
    const q = db[idx];
    const container = document.getElementById('question-container');
    
    let html = `<span class="q-meta">PREGUNTA ${idx+1} DE ${db.length}</span>`;

    // LÓGICA DE IMAGEN AUTOMÁTICA
    if (q.img) {
        html += `
        <div class="split-layout">
            <div class="img-col"><img src="${q.img}" class="q-img" alt="Imagen de apoyo"></div>
            <div class="txt-col">
                <div class="q-text">${q.q}</div>
                <div class="options-grid">${makeOpts(q)}</div>
            </div>
        </div>`;
    } else {
        html += `<div class="q-text">${q.q}</div><div class="options-grid">${makeOpts(q)}</div>`;
    }

    container.innerHTML = html;

    // BOTONES NAV
    document.getElementById('btn-prev').disabled = idx === 0;

    const btnNext = document.getElementById('btn-next');
    const btnEnd = document.getElementById('btn-end');

    if (idx === db.length - 1) {
        btnNext.style.display = 'none';
        btnEnd.style.display = 'block';
    } else {
        btnNext.style.display = 'block';
        btnEnd.style.display = 'none';
    }
}

function makeOpts(q) {
    return q.o.map((txt, i) => {
        let cls = 'btn-opt';
        if (userAnswers[idx] !== null) {
            cls += ' disabled';
            if (i === q.a) cls += ' correct';
            else if (i === userAnswers[idx]) cls += ' wrong';
        }
        return `<button class="${cls}" onclick="pick(${i})">${txt}</button>`;
    }).join('');
}

function pick(i) {
    if (userAnswers[idx] !== null) return;
    
    if (autoAdvanceTimeout) clearTimeout(autoAdvanceTimeout);

    isPaused = true;
    userAnswers[idx] = i;

    if(i === db[idx].a) okCount++; else failCount++;
    blankCount--;
    
    document.getElementById('sc-ok').innerText = okCount;
    document.getElementById('sc-fail').innerText = failCount;
    document.getElementById('sc-blank').innerText = blankCount;

    render();
    document.getElementById('prog-bar').style.width = (userAnswers.filter(x => x !== null).length / db.length * 100) + "%";
    
    if (idx === db.length - 1) {
        autoAdvanceTimeout = setTimeout(() => {
            finishTest();
        }, 3000);
    } else {
        autoAdvanceTimeout = setTimeout(() => {
            isPaused = false;
            idx++;
            render();
        }, 3000);
    }
}

function manualNav(dir) {
    if (autoAdvanceTimeout) clearTimeout(autoAdvanceTimeout);
    isPaused = false;
    if (idx + dir >= 0 && idx + dir < db.length) {
        idx += dir;
        render();
    }
}
function prevQ() { manualNav(-1); }
function nextQ() { manualNav(1); }

function manualJump(target) {
    if (autoAdvanceTimeout) clearTimeout(autoAdvanceTimeout);
    isPaused = false;
    idx = target;
    render();
}
function jumpFirst() { manualJump(0); }
function jumpLast() { manualJump(db.length - 1); }

function togglePause() {
    isPaused = !isPaused;
    document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none';
}

function startTimer() {
    pauseInterval = setInterval(() => {
        if (!isPaused) {
            let m = Math.floor(tTotal / 60);
            let s = tTotal % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (tTotal-- <= 0) finishTest();
        }
    }, 1000);
}

function finishTest() {
    try {
        clearInterval(pauseInterval);
        if (autoAdvanceTimeout) clearTimeout(autoAdvanceTimeout);
        
        let c = 0, w = 0, b = 0;
        userAnswers.forEach((a, i) => {
            if (a === null) b++;
            else if (a === db[i].a) c++;
            else w++;
        });

        // Asegurarse de que son números y no strings (para evitar errores en Safari)
        const pc = c * 3.75;
        const pw = w * 1.25;
        let tot = pc - pw;
        if (tot < 0) tot = 0;

        let n10 = (tot / 386.25) * 10;
        if (n10 < 0) n10 = 0;

        let bolsa = "0 PUNTOS";
        if (n10 >= 3.5 && n10 <= 4) bolsa = "5 PUNTOS";
        else if (n10 > 4 && n10 <= 5) bolsa = "10 PUNTOS";
        else if (n10 > 5 && n10 <= 6) bolsa = "15 PUNTOS";
        else if (n10 > 6 && n10 <= 7) bolsa = "20 PUNTOS";
        else if (n10 > 7 && n10 <= 8) bolsa = "30 PUNTOS";
        else if (n10 > 8 && n10 <= 9) bolsa = "40 PUNTOS";
        else if (n10 > 9) bolsa = "50 PUNTOS";

        document.getElementById('r-ok').innerText = c;
        document.getElementById('r-fail').innerText = w;
        document.getElementById('r-blank').innerText = b;
        
        // PINTAR LOS CÁLCULOS
        document.getElementById('pts-ok').innerText = pc.toFixed(2);
        document.getElementById('pts-fail').innerText = pw.toFixed(2);
        document.getElementById('pts-total').innerText = tot.toFixed(2);
        
        document.getElementById('val-10').innerText = n10.toFixed(2);
        document.getElementById('val-bolsa').innerText = bolsa;
        
        const qt = n10 >= 8 ? '"El éxito no es el final, el fracaso no es fatal: es el coraje para continuar." - Churchill' : (n10 >= 5 ? '"Cree que puedes y casi habrás llegado." - Roosevelt' : '"Nuestra mayor gloria no es no caer nunca, sino levantarnos." - Confucio');
        document.getElementById('quote-area').innerText = qt;

        let rev = "";
        db.forEach((q, i) => {
            let u = userAnswers[i];
            let st = u === q.a ? '<span style="color:var(--ok)">✅ Correcta</span>' : (u === null ? '<span style="color:var(--blank)">⚪ Blanco</span>' : '<span style="color:var(--fail)">❌ Incorrecta</span>');
            rev += `<div class="rev-item"><strong>${i+1}. ${st}</strong><br>${q.q}<br><span style="color:var(--ok); font-weight:bold">Correcta: ${q.o[q.a]}</span></div>`;
        });
        document.getElementById('review-list').innerHTML = rev;

        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('results-view').style.display = 'block';
        window.scrollTo(0,0);
        
    } catch(e) {
        console.error(e);
        const errBox = document.getElementById('crash-msg');
        if(errBox) {
            errBox.style.display = 'block';
            errBox.innerHTML = "Error interno al finalizar el test. Contacta con soporte: " + e.message;
        }
    }
}

window.onload = function() {
    render();
    startTimer();
};
</script>
</body>
</html>
